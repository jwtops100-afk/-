<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>해성전력계통 – 사업장 현황</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="main-body">

<!-- ── 헤더 ── -->
<header class="main-header">
  <div class="header-left">
    <div class="header-logo-icon">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="20,3 37,12 37,28 20,37 3,28 3,12" fill="#0d47a1" opacity=".3"/>
        <polygon points="20,3 37,12 37,28 20,37 3,28 3,12" fill="none" stroke="#42a5f5" stroke-width="2"/>
        <polyline points="12,20 18,26 28,14" stroke="#42a5f5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="header-title-block">
      <span class="header-company">해성전력계통</span>
      <span class="header-sub">사업장 현황 시스템</span>
    </div>
  </div>
  <div class="header-right">
    <span class="header-user">
      {% if role == 'admin' %}
        <span class="badge-admin">관리자</span>
      {% else %}
        <span class="badge-user">사용자</span>
      {% endif %}
      {{ username }}
    </span>
    <a href="{{ url_for('logout') }}" class="btn-logout">로그아웃</a>
  </div>
</header>

<!-- ── 관리자 툴바 ── -->
{% if role == 'admin' %}
<div class="admin-toolbar" id="adminToolbar">
  <div class="toolbar-section">
    <span class="toolbar-label">편집 모드</span>
    <label class="toggle-switch">
      <input type="checkbox" id="editModeToggle"/>
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="toolbar-section" id="editTools" style="display:none;">
    <button class="tb-btn tb-btn-primary" onclick="openAddBuildingModal()">
      <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"/></svg>
      건물 추가
    </button>
    <label class="tb-btn tb-btn-secondary" title="사업장 지도 이미지 교체">
      <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"/></svg>
      지도 변경
      <input type="file" id="mapUploadInput" accept="image/*" style="display:none;" onchange="uploadMap(event)"/>
    </label>
  </div>
  <div class="toolbar-hint" id="editHint" style="display:none;">
    💡 건물 아이콘을 드래그하여 위치를 변경하세요
  </div>
</div>
{% endif %}

<!-- ── 지도 영역 ── -->
<main class="map-container" id="mapContainer">
  <div class="map-wrapper" id="mapWrapper">
    <!-- 사업장 지도 배경 -->
    <div class="map-bg" id="mapBg">
      <div class="map-placeholder" id="mapPlaceholder">
        <svg viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="5" y="5" width="70" height="50" rx="4" fill="#1e3a5f" opacity=".4" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="4 3"/>
          <rect x="12" y="12" width="18" height="14" rx="2" fill="#1a73e8" opacity=".5"/>
          <rect x="12" y="30" width="14" height="18" rx="2" fill="#1a73e8" opacity=".3"/>
          <rect x="34" y="18" width="22" height="16" rx="2" fill="#1a73e8" opacity=".4"/>
          <rect x="50" y="8" width="20" height="18" rx="2" fill="#1a73e8" opacity=".3"/>
          <rect x="36" y="38" width="16" height="14" rx="2" fill="#1a73e8" opacity=".4"/>
          <line x1="30" y1="19" x2="34" y2="26" stroke="#42a5f5" stroke-width=".8" opacity=".6"/>
          <line x1="26" y1="30" x2="36" y2="38" stroke="#42a5f5" stroke-width=".8" opacity=".6"/>
        </svg>
        <p>사업장 지도를 업로드해 주세요</p>
        {% if role == 'admin' %}
        <label class="placeholder-upload-btn">
          지도 이미지 선택
          <input type="file" accept="image/*" style="display:none;" onchange="uploadMap(event)"/>
        </label>
        {% endif %}
      </div>
    </div>

    <!-- 건물 아이콘 레이어 -->
    <div class="buildings-layer" id="buildingsLayer"></div>
  </div>
</main>

<!-- ============================================================
     모달: 건물 추가/편집
============================================================ -->
<div class="modal-overlay" id="buildingModal" style="display:none;">
  <div class="modal-card">
    <div class="modal-header">
      <h3 id="modalTitle">건물 추가</h3>
      <button class="modal-close" onclick="closeBuildingModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="modalBuildingId"/>

      <div class="form-group">
        <label>건물명</label>
        <input type="text" id="modalBuildingName" placeholder="예: 본관, A동" />
      </div>

      <div class="form-group">
        <label>아이콘 색상</label>
        <div class="color-palette" id="colorPalette">
          <span class="cp-swatch active" data-color="#1a73e8" style="background:#1a73e8;" onclick="selectColor(this)"></span>
          <span class="cp-swatch" data-color="#e53935" style="background:#e53935;" onclick="selectColor(this)"></span>
          <span class="cp-swatch" data-color="#43a047" style="background:#43a047;" onclick="selectColor(this)"></span>
          <span class="cp-swatch" data-color="#fb8c00" style="background:#fb8c00;" onclick="selectColor(this)"></span>
          <span class="cp-swatch" data-color="#8e24aa" style="background:#8e24aa;" onclick="selectColor(this)"></span>
          <span class="cp-swatch" data-color="#00acc1" style="background:#00acc1;" onclick="selectColor(this)"></span>
          <input type="color" id="customColor" value="#1a73e8" title="직접 선택" onchange="setCustomColor(this.value)"/>
        </div>
      </div>

      <div class="form-group">
        <label>층수 목록</label>
        <div class="floor-editor" id="floorEditor"></div>
        <button class="btn-add-floor" onclick="addFloorRow()">+ 층 추가</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeBuildingModal()">취소</button>
      <button class="btn-primary" onclick="saveBuilding()">저장</button>
    </div>
  </div>
</div>

<!-- ============================================================
     모달: 층수 선택 (일반 보기)
============================================================ -->
<div class="modal-overlay" id="floorModal" style="display:none;">
  <div class="modal-card floor-modal-card">
    <div class="modal-header" id="floorModalHeader">
      <h3 id="floorModalTitle">건물명</h3>
      <div class="floor-modal-actions">
        {% if role == 'admin' %}
        <button class="btn-icon-edit" id="floorModalEditBtn" title="건물 편집" onclick="editBuildingFromFloor()">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/></svg>
        </button>
        <button class="btn-icon-delete" title="건물 삭제" onclick="deleteBuildingFromFloor()">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
        </button>
        {% endif %}
        <button class="modal-close" onclick="closeFloorModal()">✕</button>
      </div>
    </div>
    <div class="modal-body floor-grid-body">
      <div class="floor-grid" id="floorGrid"></div>
    </div>
  </div>
</div>

<!-- 데이터 전달 -->
<script>
  const USER_ROLE = "{{ role }}";
  const INITIAL_BUILDINGS = {{ buildings | tojson }};
</script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
